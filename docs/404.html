<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Page envolée — Chợ Vỉa Hè</title>
<link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32" />
<link rel="icon" href="/favicon-16.png" type="image/png" sizes="16x16" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#ECEBD7" />

<link rel="stylesheet" href="/fonts/fonts.css" />

<link rel="stylesheet" href="/home.css" />

<style>
  .err-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: calc(var(--header-h) + 2rem) var(--pad-x) 3rem;
    position: relative;
    z-index: 1;
  }
  .err-inner { max-width: 34rem; }
  .err-code {
    font-family: var(--f-hand);
    font-weight: 600;
    color: var(--bleu);
    font-size: clamp(4rem, 18vw, 8rem);
    line-height: 1;
    transform: rotate(-4deg);
    opacity: 0.85;
    margin: 0 0 0.4rem;
  }
  .err-illus {
    width: clamp(140px, 42vw, 260px);
    margin: 0 auto 1.4rem;
    filter: drop-shadow(0 12px 18px rgba(30,26,23,0.14));
  }
  .err-illus img { width: 100%; }
  .err-title {
    font-family: var(--f-titre);
    font-weight: 600;
    color: var(--framboise);
    font-size: clamp(1.7rem, 1.2rem + 3vw, 2.6rem);
    margin: 0 0 0.4rem;
  }
  .err-note {
    font-family: var(--f-hand);
    font-weight: 600;
    color: var(--bleu);
    font-size: clamp(1.3rem, 4vw, 1.8rem);
    transform: rotate(-2deg);
    display: inline-block;
    margin: 0 0 1.6rem;
  }
  .err-lead { color: var(--encre-doux); max-width: 32ch; margin: 0 auto 1.8rem; }
  .err-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.9rem 1.2rem;
    justify-content: center;
    align-items: center;
  }
</style>
</head>
<body>

<a class="skip-link" href="#contenu">Aller au contenu</a>

<header class="site-header">
  <div class="wrap">
    <a class="wordmark" href="/"><span class="viet" lang="vi">Chợ Vỉa Hè</span></a>
    <a class="btn-cta btn-cta--sm header-cta" href="https://bookings.zenchef.com/results?rid=377642&amp;utm_source=site&amp;utm_medium=cta&amp;utm_campaign=resa" target="_blank" rel="noopener">Réserver</a>
  </div>
</header>

<main id="contenu" class="err-page">
  <div class="err-inner">
    <p class="err-code handwritten">404</p>
    <div class="err-illus" aria-hidden="true">
      <img src="/assets/illus/velo-480.webp" width="480" height="360"
           srcset="/assets/illus/velo-480.webp 480w, /assets/illus/velo-960.webp 960w"
           sizes="clamp(140px, 42vw, 260px)" alt="" decoding="async"
           onerror="this.closest('.err-illus').style.display='none'" />
    </div>
    <h1 class="err-title">Cette page a filé.</h1>
    <p class="err-note handwritten">page envolée…</p>
    <p class="err-lead">Le scooter est reparti sans elle. Mais l'étal, lui, vous attend toujours.</p>
    <p class="err-actions">
      <a class="btn-cta" href="/">Retour à l'accueil</a>
      <a class="ink-link" href="/carte/">La carte</a>
      <a class="ink-link" href="https://bookings.zenchef.com/results?rid=377642&amp;utm_source=site&amp;utm_medium=cta&amp;utm_campaign=resa" target="_blank" rel="noopener">Réserver</a>
    </p>
  </div>
</main>

<script src="/analytics.js" defer></script>
</body>
</html>
